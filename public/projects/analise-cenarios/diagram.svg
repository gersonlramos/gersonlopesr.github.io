<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260" role="img" aria-label="Analise_cenarios pipeline: raw Jira exports parsed and aggregated, fed into a scenario simulation engine, rendered as a Plotly Gantt visualization on the live demo">
  <rect width="920" height="260" fill="#0a0e14"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <g>
    <rect x="20" y="85" width="190" height="90" rx="8" fill="#111827" stroke="#1e293b" stroke-width="2"/>
    <text x="115" y="120" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">Raw Jira Exports</text>
    <text x="115" y="142" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">9 domain .txt files</text>
  </g>
  <line x1="210" y1="130" x2="248" y2="130" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="250" y="85" width="190" height="90" rx="8" fill="#111827" stroke="#1e293b" stroke-width="2"/>
    <text x="345" y="120" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">Parsing &amp; Aggregation</text>
    <text x="345" y="142" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Python + Pandas</text>
  </g>
  <line x1="440" y1="130" x2="478" y2="130" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="480" y="85" width="190" height="90" rx="8" fill="#111827" stroke="#1e293b" stroke-width="2"/>
    <text x="575" y="120" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">Scenario Simulation</text>
    <text x="575" y="142" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">squad allocation logic</text>
  </g>
  <line x1="670" y1="130" x2="708" y2="130" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="710" y="85" width="190" height="90" rx="8" fill="#111827" stroke="#1e293b" stroke-width="2"/>
    <text x="805" y="120" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">Gantt Visualization</text>
    <text x="805" y="142" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Plotly -&gt; GitHub Pages demo</text>
  </g>
</svg>
